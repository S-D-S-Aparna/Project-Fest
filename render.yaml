services:
  - type: web
    name: project-fest-backend
    env: node
    rootDir: "Back end"
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: project-fest-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
databases:
  - name: project-fest-db
    plan: free
    postgresMajorVersion: "15"
